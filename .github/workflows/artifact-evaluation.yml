name: artifact-evaluation
run-name: ${{ inputs.task }}
on:
  workflow_dispatch:
    inputs:
      task:
        type: choice
        required: true
        options:
        - task_1
        - task_2
jobs:
  task_1:
    if: ${{ inputs.task == 'task_1' }}
    runs-on: [self-hosted, ae-server]
    steps:
      - run: sleep 1m
  task_2:
    if: ${{ inputs.task == 'task_2' }}
    runs-on: [self-hosted, ae-machine]
    steps:
      - run: sleep 1m
